<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1117"/>
      <stop offset="50%" stop-color="#0D1018"/>
      <stop offset="100%" stop-color="#070910"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#60A5FA" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E2940" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridMajor" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#1E2940" stroke-width="1"/>
    </pattern>
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#gridMajor)"/>
  <ellipse cx="900" cy="450" rx="700" ry="500" fill="url(#glow)"/>
  <ellipse cx="450" cy="700" rx="350" ry="250" fill="url(#amberGlow)"/>

  <!-- Corner brackets (HUD frame) -->
  <g stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 60 60 L 60 110 M 60 60 L 110 60"/>
    <path d="M 1540 60 L 1540 110 M 1540 60 L 1490 60"/>
    <path d="M 60 840 L 60 790 M 60 840 L 110 840"/>
    <path d="M 1540 840 L 1540 790 M 1540 840 L 1490 840"/>
  </g>

  <!-- Top-left telemetry -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#60A5FA" opacity="0.85">
    <text x="80" y="100" font-size="14" letter-spacing="4">PROJECT.OPENCV_ARM</text>
    <text x="80" y="125" font-size="11" letter-spacing="3" fill="#475569">// CONCEPT RENDER PENDING</text>
  </g>

  <!-- Top-right status -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="3" text-anchor="end">
    <text x="1520" y="100" fill="#F59E0B">● STATUS: ACTIVE WIP</text>
    <text x="1520" y="125" fill="#475569">REV 2026.04</text>
  </g>

  <!-- Bottom-left coordinates -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#475569">
    <text x="80" y="810">X: 0.00  Y: 0.00  Z: 0.00</text>
    <text x="80" y="828">DOF: 3  TCP_ACCURACY_TGT: ≤5mm</text>
  </g>

  <!-- Bottom-right -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="3" fill="#475569" text-anchor="end">
    <text x="1520" y="810">CAD_RENDER.TBD</text>
    <text x="1520" y="828">JM.ENG // PORTFOLIO</text>
  </g>

  <!-- Center robotic arm wireframe schematic -->
  <g transform="translate(800, 450)" stroke="#60A5FA" fill="none" filter="url(#blueGlow)">

    <!-- Workspace floor circle -->
    <ellipse cx="0" cy="180" rx="280" ry="40" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>
    <ellipse cx="0" cy="180" rx="180" ry="26" stroke-width="1" stroke-dasharray="2 4" opacity="0.3"/>

    <!-- Base -->
    <rect x="-50" y="140" width="100" height="40" stroke-width="2" rx="4"/>
    <line x1="-50" y1="160" x2="50" y2="160" stroke-width="1" opacity="0.5"/>

    <!-- Joint 1 (base rotation) -->
    <circle cx="0" cy="140" r="14" stroke-width="2" fill="#0F1117"/>
    <circle cx="0" cy="140" r="6" stroke-width="1" opacity="0.7"/>

    <!-- Link 1 (vertical) -->
    <line x1="0" y1="140" x2="0" y2="20" stroke-width="3"/>
    <line x1="-8" y1="140" x2="-8" y2="20" stroke-width="1" opacity="0.4"/>
    <line x1="8" y1="140" x2="8" y2="20" stroke-width="1" opacity="0.4"/>

    <!-- Joint 2 (shoulder) -->
    <circle cx="0" cy="20" r="14" stroke-width="2" fill="#0F1117"/>
    <circle cx="0" cy="20" r="6" stroke-width="1" opacity="0.7"/>

    <!-- Link 2 (diagonal up-right) -->
    <line x1="0" y1="20" x2="140" y2="-80" stroke-width="3"/>
    <line x1="-5" y1="14" x2="135" y2="-86" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="26" x2="145" y2="-74" stroke-width="1" opacity="0.4"/>

    <!-- Joint 3 (elbow) -->
    <circle cx="140" cy="-80" r="12" stroke-width="2" fill="#0F1117"/>
    <circle cx="140" cy="-80" r="5" stroke-width="1" opacity="0.7"/>

    <!-- Link 3 (forearm) -->
    <line x1="140" y1="-80" x2="240" y2="-30" stroke-width="3"/>
    <line x1="135" y1="-71" x2="235" y2="-21" stroke-width="1" opacity="0.4"/>
    <line x1="145" y1="-89" x2="245" y2="-39" stroke-width="1" opacity="0.4"/>

    <!-- End effector -->
    <g transform="translate(240, -30)">
      <circle r="10" stroke-width="2" fill="#0F1117"/>
      <line x1="-12" y1="0" x2="-22" y2="-8" stroke-width="2" stroke="#F59E0B"/>
      <line x1="-12" y1="0" x2="-22" y2="8" stroke-width="2" stroke="#F59E0B"/>
      <line x1="0" y1="-10" x2="0" y2="-22" stroke-width="2" stroke="#F59E0B"/>
      <line x1="0" y1="10" x2="0" y2="22" stroke-width="2" stroke="#F59E0B"/>
    </g>

    <!-- Camera frustum (looking down at workspace) -->
    <g opacity="0.6" stroke-dasharray="4 4">
      <line x1="-220" y1="-140" x2="-110" y2="80" stroke-width="1.5"/>
      <line x1="-140" y1="-140" x2="110" y2="80" stroke-width="1.5"/>
      <rect x="-200" y="-180" width="60" height="40" stroke-width="2" stroke-dasharray="0" fill="#0F1117"/>
      <circle cx="-170" cy="-160" r="8" stroke-width="1.5" stroke-dasharray="0"/>
      <circle cx="-170" cy="-160" r="3" stroke-width="1" stroke-dasharray="0" opacity="0.7"/>
    </g>

    <!-- Detected target on workspace -->
    <g opacity="0.85">
      <rect x="-30" y="170" width="60" height="35" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
      <circle cx="0" cy="187" r="3" fill="#F59E0B"/>
      <text x="36" y="185" font-family="ui-monospace, monospace" font-size="9" fill="#F59E0B" letter-spacing="1">TARGET_01</text>
      <text x="36" y="197" font-family="ui-monospace, monospace" font-size="8" fill="#F59E0B" opacity="0.7" letter-spacing="1">CONF: 0.94</text>
    </g>

    <!-- Coordinate axes -->
    <g opacity="0.5">
      <line x1="-280" y1="180" x2="-220" y2="180" stroke="#60A5FA" stroke-width="1.5"/>
      <line x1="-280" y1="180" x2="-280" y2="120" stroke="#60A5FA" stroke-width="1.5"/>
      <text x="-215" y="184" font-family="ui-monospace, monospace" font-size="10" fill="#60A5FA">X</text>
      <text x="-285" y="115" font-family="ui-monospace, monospace" font-size="10" fill="#60A5FA">Z</text>
    </g>

    <!-- Annotation labels with leader lines -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#60A5FA" opacity="0.85" letter-spacing="1.5">
      <line x1="0" y1="140" x2="-80" y2="140" stroke="#60A5FA" stroke-width="0.5" opacity="0.5"/>
      <text x="-180" y="143">J1 // BASE_ROT</text>

      <line x1="0" y1="20" x2="-80" y2="20" stroke="#60A5FA" stroke-width="0.5" opacity="0.5"/>
      <text x="-180" y="23">J2 // SHOULDER</text>

      <line x1="140" y1="-80" x2="200" y2="-130" stroke="#60A5FA" stroke-width="0.5" opacity="0.5"/>
      <text x="205" y="-128">J3 // ELBOW</text>

      <line x1="240" y1="-30" x2="290" y2="-30" stroke="#60A5FA" stroke-width="0.5" opacity="0.5"/>
      <text x="295" y="-27">END_EFFECTOR</text>
    </g>
  </g>

  <!-- Center title overlay -->
  <g text-anchor="middle">
    <text x="800" y="780" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#60A5FA" letter-spacing="6">COMPUTER VISION ROBOTIC ARM</text>
    <text x="800" y="800" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#475569" letter-spacing="3">KINEMATIC SCHEMATIC // RENDER PENDING FABRICATION</text>
  </g>

  <!-- Scan line decoration -->
  <line x1="60" y1="450" x2="180" y2="450" stroke="#60A5FA" stroke-width="0.5" opacity="0.3"/>
  <line x1="1420" y1="450" x2="1540" y2="450" stroke="#60A5FA" stroke-width="0.5" opacity="0.3"/>
</svg>
